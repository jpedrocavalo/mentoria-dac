  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

src: url(\"7253b4b0-9f35-47de-a966-9d16f2269188\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; } }\n    ::selection { background: #E8F0EC; color: #1E4D40; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Sora',system-ui,sans-serif;font-size:17px;line-height:1.7;color:#1C2321;background:#FBFAF7;overflow-x:hidden\" data-screen-label=\"Página de vendas — Mentoria DAC (1c: blocos)\">\n\n  <!-- HERO -->\n  <section style=\"padding:64px 0 48px;background:#1E4D40;color:#fff;border-radius:0 0 40px 40px\" data-screen-label=\"Hero\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;text-align:center\">\n      <span style=\"display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.14);color:#fff;font-size:.85rem;font-weight:700;padding:8px 18px;border-radius:999px;margin-bottom:26px\">\n        <i style=\"width:8px;height:8px;border-radius:50%;background:#C25E3A;display:inline-block\"><\u002Fi>Mentoria Individual DAC · 6 meses\n      <\u002Fspan>\n      <h1 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.22;color:#fff;font-size:clamp(1.9rem,5.6vw,2.9rem);font-weight:600;margin:0 0 22px;max-width:640px;margin-left:auto;margin-right:auto\">Sua clínica tem um teto de vidro.<br><span style=\"color:#9CC5B4;font-style:italic\">Em 6 meses, a gente rompe ele juntos.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:1.1rem;color:#DCE8E2;max-width:600px;margin:0 auto 34px\">Mentoria individual para psicólogos com 2+ anos de formação que querem estruturar a clínica, ter pacientes chegando com consistência e construir o caminho para <strong style=\"color:#fff;font-weight:600\">R$10 a R$15 mil por mês — sem convênios<\u002Fstrong>.<\u002Fp>\n      <a href=\"https://pay.kiwify.com.br/o8dA7PG\" style=\"display:inline-block;background:#fff;color:#1E4D40;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.05rem;padding:18px 34px;border-radius:999px;text-decoration:none;box-shadow:0 10px 26px rgba(0,0,0,.18)\" style-hover=\"background:#F0EEE8\" data-comment-anchor=\"cta-hero\">Quero começar a mentoria<\u002Fa>\n      <p style=\"font-size:.85rem;color:#B9D2C7;margin-top:14px\">Acesso liberado assim que a matrícula for confirmada<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROOF CHIPS -->\n  <section style=\"padding:36px 0 8px\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap\">\n      <div style=\"background:#fff;border-radius:18px;padding:18px 24px;box-shadow:0 6px 18px rgba(30,77,64,.08);text-align:center\">\n        <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.4rem;color:#1E4D40;display:block;line-height:1.1\">10x mais<\u002Fb>\n        <span style=\"font-size:.8rem;color:#5A6660\">de faturamento em 5 meses<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:18px;padding:18px 24px;box-shadow:0 6px 18px rgba(30,77,64,.08);text-align:center\">\n        <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.4rem;color:#1E4D40;display:block;line-height:1.1\">10+ anos<\u002Fb>\n        <span style=\"font-size:.8rem;color:#5A6660\">de clínica da mentora<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:18px;padding:18px 24px;box-shadow:0 6px 18px rgba(30,77,64,.08);text-align:center\">\n        <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.4rem;color:#1E4D40;display:block;line-height:1.1\">12 sessões<\u002Fb>\n        <span style=\"font-size:.8rem;color:#5A6660\">acompanhamento 1:1 em 6 meses<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DORES (PROBLEM) -->\n  <section style=\"padding:56px 0\" data-screen-label=\"Dores\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;text-align:center\">\n      <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E4D40;margin-bottom:14px\">Talvez você se reconheça aqui<\u002Fp>\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.75rem;margin:0 0 28px\">Competência você tem de sobra.<br>O que falta é estrutura.<\u002Fh2>\n\n      <div style=\"text-align:left;display:grid;gap:14px\">\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:22px 24px\">\n          <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.05rem;display:block;margin-bottom:4px;color:#1E4D40\">Agenda cheia, conta vazia<\u002Fb>\n          <p style=\"margin:0;font-size:.98rem;color:#3f4b46\">Você atende muito, cobra pouco e não reajusta há tempo demais — porque uma voz interna insiste que \"ninguém paga caro por psicologia\".<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:22px 24px\">\n          <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.05rem;display:block;margin-bottom:4px;color:#1E4D40\">Paciente que chega por sorte<\u002Fb>\n          <p style=\"margin:0;font-size:.98rem;color:#3f4b46\">Sem fluxo de captação, o mês bom depende de indicação. E o mês ruim vira pânico silencioso.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:22px 24px\">\n          <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.05rem;display:block;margin-bottom:4px;color:#1E4D40\">Clínica sem processos<\u002Fb>\n          <p style=\"margin:0;font-size:.98rem;color:#3f4b46\">Sem contrato, sem política de faltas, sem previsibilidade. Cada cancelamento é prejuízo e desgaste.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:22px 24px\">\n          <b style=\"font-family:'Fraunces',Georgia,serif;font-size:1.05rem;display:block;margin-bottom:4px;color:#1E4D40\">Dinheiro que entra e some<\u002Fb>\n          <p style=\"margin:0;font-size:.98rem;color:#3f4b46\">Você fatura, paga as contas e não sabe dizer quanto sobrou — nem quanto poderia crescer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin-top:26px;margin-bottom:0;text-align:left\">Nada disso é falta de capacidade técnica. É o que acontece quando um profissional excelente sai da graduação <strong style=\"font-weight:600\">sem nunca ter aprendido a construir um negócio<\u002Fstrong> — porque ninguém ensinou.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MÉTODO (SOLUTION) -->\n  <section style=\"padding:8px 16px 56px\" data-screen-label=\"Método DAC\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;background:#1E4D40;color:#fff;border-radius:32px;padding:44px 34px\">\n      <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9CC5B4;margin-bottom:14px;text-align:center\">O Método DAC<\u002Fp>\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#fff;font-size:1.6rem;margin:0 0 16px;text-align:center\">Por que tanto psicólogo faz curso de marketing e continua no mesmo faturamento?<\u002Fh2>\n      <p style=\"color:#DCE8E2;text-align:center;max-width:520px;margin:0 auto 28px\">Porque estratégia aplicada em cima de crença errada não sustenta. O DAC segue a ordem que funciona:<\u002Fp>\n\n      <div style=\"display:flex;gap:16px;margin-bottom:22px\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:1.4rem;color:#9CC5B4;flex-shrink:0\">D<\u002Fdiv>\n        <div>\n          <h3 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#fff;font-size:1.15rem;margin:0 0 6px\">Desconstrução de crenças<\u002Fh3>\n          <p style=\"color:#DCE8E2;font-size:.96rem;margin:0\">O ponto de partida que quase todo mundo pula. Dinheiro, valor profissional, medo de cobrar, a certeza de que \"ninguém paga caro por psicologia\". Sem tratar a raiz, nenhuma técnica dura.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;margin-bottom:22px\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:1.4rem;color:#9CC5B4;flex-shrink:0\">A<\u002Fdiv>\n        <div>\n          <h3 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#fff;font-size:1.15rem;margin:0 0 6px\">Aceleração da clínica<\u002Fh3>\n          <p style=\"color:#DCE8E2;font-size:.96rem;margin:0\">Captação por múltiplos canais (orgânico e pago), posicionamento, comunicação ética dentro das normas do CFP, parcerias e reorganização da clínica.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px\">\n        <div style=\"width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',Georgia,serif;font-weight:700;font-size:1.4rem;color:#9CC5B4;flex-shrink:0\">C<\u002Fdiv>\n        <div>\n          <h3 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#fff;font-size:1.15rem;margin:0 0 6px\">Consolidação financeira<\u002Fh3>\n          <p style=\"color:#DCE8E2;font-size:.96rem;margin:0\">Gestão, precificação, contabilidade para psicólogos e previsibilidade — a estrutura para sustentar e crescer o faturamento, mês após mês.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ENTREGA -->\n  <section style=\"padding:0 0 56px\" data-screen-label=\"Como funciona\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;text-align:center\">\n      <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E4D40;margin-bottom:14px\">Como funciona<\u002Fp>\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.75rem;margin:0 0 12px\">Acompanhamento individual, de verdade<\u002Fh2>\n      <p style=\"color:#5A6660;margin-bottom:26px\">Não é curso que você assiste sozinho. É a estrutura de uma supervisão — aplicada ao negócio da sua clínica.<\u002Fp>\n\n      <div style=\"text-align:left;display:grid;gap:12px\">\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:20px 22px;display:flex;gap:14px;align-items:flex-start\">\n          <span style=\"color:#1E4D40;font-weight:700;font-size:1.2rem;flex-shrink:0\">✓<\u002Fspan>\n          <div><b style=\"display:block;margin-bottom:2px\">12 sessões individuais 1:1 com a Andreza<\u002Fb><p style=\"margin:0;font-size:.95rem;color:#3f4b46\">Encontros quinzenais ao longo de 6 meses. Estratégia construída para o SEU caso, sua especialidade e sua cidade.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:20px 22px;display:flex;gap:14px;align-items:flex-start\">\n          <span style=\"color:#1E4D40;font-weight:700;font-size:1.2rem;flex-shrink:0\">✓<\u002Fspan>\n          <div><b style=\"display:block;margin-bottom:2px\">Aulas gravadas + exercícios do Método DAC<\u002Fb><p style=\"margin:0;font-size:.95rem;color:#3f4b46\">Todos os módulos — crenças, captação, tráfego, gestão, precificação — com acesso durante os 6 meses.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:20px 22px;display:flex;gap:14px;align-items:flex-start\">\n          <span style=\"color:#1E4D40;font-weight:700;font-size:1.2rem;flex-shrink:0\">✓<\u002Fspan>\n          <div><b style=\"display:block;margin-bottom:2px\">Suporte entre sessões<\u002Fb><p style=\"margin:0;font-size:.95rem;color:#3f4b46\">Canal direto para dúvidas de implementação, para você não travar entre um encontro e outro.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#E8F0EC;border-radius:20px;padding:20px 22px;display:flex;gap:14px;align-items:flex-start\">\n          <span style=\"color:#1E4D40;font-weight:700;font-size:1.2rem;flex-shrink:0\">✓<\u002Fspan>\n          <div><b style=\"display:block;margin-bottom:2px\">Plano de implementação com metas<\u002Fb><p style=\"margin:0;font-size:.95rem;color:#3f4b46\">Definimos a meta no início — como foi com a Susy — e acompanhamos os números até lá.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROVA SOCIAL -->\n  <section style=\"padding:0 0 56px\" data-screen-label=\"Prova social\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;text-align:center\">\n      <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E4D40;margin-bottom:14px\">Quem já passou por aqui<\u002Fp>\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.75rem;margin:0 0 24px\">\"Teve meses que até dobrei a meta.\"<\u002Fh2>\n\n      <div style=\"background:#fff;border-radius:28px;padding:34px 30px;box-shadow:0 12px 32px rgba(30,77,64,.1)\">\n        <blockquote style=\"font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:1.18rem;line-height:1.55;margin:0 0 20px\">\"Saí de empregos que eu considerava inferiores à minha capacidade técnica e hoje alcancei a meta que colocamos lá no início — teve meses que até dobrei. Seu trabalho foi essencial e fez total diferença para essa virada de chave na minha vida profissional.\"<\u002Fblockquote>\n        <div style=\"display:flex;align-items:center;gap:14px;justify-content:center\">\n          <div style=\"width:52px;height:52px;border-radius:50%;flex-shrink:0;overflow:hidden\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"3352bff0-d947-4aca-b9d2-4e21b02b1eae#/image-slot.js\" id=\"foto-susy\" shape=\"circle\" placeholder=\"Foto Susy\" style=\"width:52px;height:52px\" hint-size=\"52px,52px\"><\u002Fx-import>\n          <\u002Fdiv>\n          <div style=\"text-align:left\"><b style=\"display:block;font-size:.98rem\">Susy Morais<\u002Fb><span style=\"font-size:.85rem;color:#5A6660\">Psicóloga · Avaliação psicológica<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:18px;padding-top:18px;border-top:1px dashed #D9DFDB;font-size:.95rem\">Susy faturava pouco quando entrou. Em 5 meses, estruturou a clínica de avaliações e hoje fatura <b style=\"color:#1E4D40\">10x mais<\u002Fb> do que faturava.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:.78rem;color:#5A6660;margin-top:14px;margin-bottom:0\">Resultados individuais variam conforme especialidade, dedicação e implementação. Nenhum resultado financeiro é garantido.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SOBRE -->\n  <section style=\"padding:0 0 56px\" data-screen-label=\"Sobre a mentora\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px\">\n      <div style=\"background:#E8F0EC;border-radius:28px;padding:34px 30px;display:grid;gap:26px;grid-template-columns:150px 1fr;align-items:center\">\n        <div style=\"width:130px;height:130px;border-radius:50%;border:4px solid #fff;box-shadow:0 8px 24px rgba(30,77,64,.14);overflow:hidden;margin:0 auto\">\n          <x-import component-from-global-scope=\"image-slot\" from=\"3352bff0-d947-4aca-b9d2-4e21b02b1eae#/image-slot.js\" id=\"foto-andreza\" shape=\"circle\" placeholder=\"Foto Andreza\" style=\"width:130px;height:130px\" hint-size=\"130px,130px\"><\u002Fx-import>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E4D40;margin-bottom:14px\">Quem conduz<\u002Fp>\n          <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.6rem;margin:0 0 16px\">Andreza Barros<\u002Fh2>\n          <p>Psicóloga clínica há mais de 10 anos, especialista em construção de clínicas lucrativas para psicólogos. Depois de estruturar a própria clínica sem depender de convênios, criou o Método DAC para encurtar o caminho de colegas que têm a competência — mas nunca receberam a estrutura.<\u002Fp>\n          <p style=\"color:#5A6660;font-size:.9rem;margin:0\">Instagram: @andreza.barros.psi · CRP 17/3631<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- OFERTA -->\n  <section id=\"aplicar\" style=\"padding:8px 16px 56px\" data-screen-label=\"Oferta\">\n    <div style=\"width:100%;max-width:640px;margin:0 auto\">\n      <div style=\"background:#FDF6F1;border:2px solid #C25E3A;border-radius:28px;padding:40px 32px;text-align:center\">\n        <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#C25E3A;margin-bottom:14px\">Investimento<\u002Fp>\n        <h3 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.4rem;margin:0 0 6px\">Mentoria Individual DAC — 6 meses<\u002Fh3>\n        <p style=\"color:#5A6660;font-size:.95rem\">12 sessões 1:1 · aulas + exercícios · suporte entre sessões · plano com metas<\u002Fp>\n\n        <p style=\"font-family:'Fraunces',Georgia,serif;font-size:2.6rem;font-weight:700;color:#1E4D40;line-height:1.1;margin:14px 0 4px\">R$2.997<\u002Fp>\n        <p style=\"color:#5A6660;font-size:.92rem;margin-bottom:22px\">ou 12x de R$249,75 no cartão<\u002Fp>\n\n        <div style=\"background:#fff;border-radius:16px;padding:18px 20px;margin:0 0 24px;font-size:.93rem;text-align:left;display:flex;gap:12px;align-items:flex-start\">\n          <div style=\"width:36px;height:36px;border-radius:50%;background:#E8F0EC;color:#1E4D40;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;font-family:'Fraunces',Georgia,serif\">✓<\u002Fdiv>\n          <div><b style=\"color:#1C2321\">Garantia de alinhamento<\u002Fb><p style=\"margin:4px 0 0;color:#5A6660\">Se depois da primeira sessão você sentir que não é o momento certo, é só me avisar, devolvo 100% do valor, sem burocracia.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"https://pay.kiwify.com.br/o8dA7PG\" style=\"display:inline-block;background:#1E4D40;color:#fff;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.05rem;padding:18px 34px;border-radius:999px;text-decoration:none;text-align:center;box-shadow:0 10px 26px rgba(30,77,64,.22);width:100%;box-sizing:border-box\" style-hover=\"background:#143830\">Quero começar a mentoria<\u002Fa>\n        <p style=\"font-size:.85rem;color:#5A6660;margin-top:12px;text-align:center\">Pagamento processado com segurança · acesso liberado após a confirmação<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <!-- FAQ -->\n  <section style=\"padding:0 0 56px\" data-screen-label=\"FAQ\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px;text-align:center\">\n      <p style=\"font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E4D40;margin-bottom:14px\">Perguntas frequentes<\u002Fp>\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#1C2321;font-size:1.75rem;margin:0 0 26px\">O que você pode estar se perguntando<\u002Fh2>\n\n      <div style=\"text-align:left\">\n        <sc-for list=\"{{ faqItems }}\" as=\"item\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff;border-radius:20px;margin-bottom:12px;overflow:hidden;box-shadow:0 3px 12px rgba(30,77,64,.06)\">\n            <div onclick=\"{{ item.onToggle }}\" style=\"padding:18px 22px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px\">\n              <span>{{ item.q }}<\u002Fspan>\n              <span style=\"font-family:'Fraunces',Georgia,serif;font-size:1.4rem;color:#1E4D40;flex-shrink:0;display:inline-block;transition:transform .2s;transform:{{ item.iconRotate }}\">+<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"max-height:{{ item.maxHeight }};overflow:hidden;transition:max-height .25s ease\">\n              <p style=\"padding:0 22px 20px;margin:0;font-size:.97rem;color:#5A6660\">{{ item.a }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA FINAL -->\n  <section style=\"padding:0 16px 56px\" data-screen-label=\"CTA final\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;background:#1E4D40;border-radius:32px;padding:48px 32px;text-align:center\">\n      <h2 style=\"font-family:'Fraunces',Georgia,serif;line-height:1.18;color:#fff;font-size:1.65rem;margin:0 0 18px\">O teto de vidro não se rompe com mais esforço.<br>Se rompe com estrutura.<\u002Fh2>\n      <p style=\"color:#DCE8E2;max-width:480px;margin:0 auto 28px\">Você já tem a competência. Os próximos 6 meses podem ser a construção da clínica que sustenta ela.<\u002Fp>\n      <a href=\"https://pay.kiwify.com.br/o8dA7PG\" style=\"display:inline-block;background:#fff;color:#1E4D40;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.05rem;padding:18px 34px;border-radius:999px;text-decoration:none;box-shadow:0 10px 26px rgba(0,0,0,.18);width:auto;min-width:340px\" style-hover=\"background:#F0EEE8\">Quero começar a mentoria<\u002Fa>\n      <p style=\"font-size:.85rem;color:#B9D2C7;margin-top:14px\">Garantia de alinhamento na primeira sessão<\u002Fp>\n      <p style=\"font-size:.85rem;margin-top:16px\"><a href=\"https://wa.me/5584987619997?text=Oi%20Andreza!%20J%C3%A1%20conhe%C3%A7o%20seu%20trabalho%20e%20quero%20entrar%20na%20mentoria.\" style=\"color:#B9D2C7;text-decoration:underline\" style-hover=\"color:#fff\">Já conhece meu trabalho e sabe que quer entrar? Fale comigo direto pelo WhatsApp<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:36px 0 110px\">\n    <div style=\"width:100%;max-width:720px;margin:0 auto;padding:0 22px\">\n      <p style=\"font-size:.82rem;color:#5A6660;text-align:center;margin-bottom:6px\">Descomplicando a Clínica © 2026<\u002Fp>\n      <p style=\"font-size:.78rem;color:#5A6660;text-align:center;margin-bottom:6px\"><a href=\"https://wa.me/5584987619997?text=Oi%20Andreza!%20J%C3%A1%20conhe%C3%A7o%20seu%20trabalho%20e%20quero%20entrar%20na%20mentoria.\" style=\"color:#5A6660;text-decoration:underline\" style-hover=\"color:#1E4D40\">Já conhece meu trabalho e sabe que quer entrar? Fale comigo direto pelo WhatsApp<\u002Fa><\u002Fp>\n      <p style=\"font-size:.82rem;color:#5A6660;text-align:center;margin-bottom:0\"><a href=\"https://legal.andrezabarros.com.br/\" style=\"color:#5A6660\" style-hover=\"color:#1E4D40\">Política de privacidade<\u002Fa> · <a href=\"https://legal.andrezabarros.com.br/termos/\" style=\"color:#5A6660\" style-hover=\"color:#1E4D40\">Termos<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- STICKY CTA MOBILE -->\n  <div style=\"display:{{ stickyDisplay }};position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(251,250,247,.96);backdrop-filter:blur(10px);border-top:1px solid #D9DFDB;z-index:999\">\n    <a href=\"https://pay.kiwify.com.br/o8dA7PG\" style=\"display:block;background:#1E4D40;color:#fff;font-family:'Sora',system-ui,sans-serif;font-weight:600;font-size:.98rem;padding:15px;border-radius:999px;text-decoration:none;text-align:center\" style-hover=\"background:#143830\">Quero começar a mentoria<\u002Fa>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { openFaq: 0, stickyVisible: false };\n\n  faqData = [\n    { q: \"Sou recém-formado. A mentoria serve para mim?\", a: \"A mentoria foi desenhada para psicólogos com 2+ anos de formação e alguma prática clínica em andamento — é nesse perfil que o método gera os melhores resultados. Se você está começando agora, me chama no WhatsApp e conversamos com honestidade se este é o momento certo pra você.\" },\n    { q: \"Atendo online. Funciona?\", a: \"Sim. Captação, posicionamento, precificação e gestão se aplicam a clínica online, presencial ou híbrida — inclusive a transição entre modelos é um dos temas trabalhados.\" },\n    { q: \"Em quanto tempo vejo resultado?\", a: \"Depende do seu ponto de partida, especialidade e implementação. A estrutura da mentoria são 6 meses com metas definidas no início e acompanhadas quinzenalmente. Resultados como o da Susy (5 meses) existem, mas não são promessa — são consequência de implementação consistente.\" },\n    { q: \"O marketing que vou aprender é compatível com o código de ética?\", a: \"Totalmente. Toda a comunicação ensinada respeita as normas do CFP: sem promessa de resultado terapêutico, sem exposição de pacientes, sem sensacionalismo. Posicionamento ético não é limitação — é o que constrói autoridade duradoura nesse mercado.\" },\n    { q: \"E se eu não puder pagar à vista?\", a: \"Sim, é possível parcelar em até 12x no cartão, direto no checkout.\" },\n    { q: \"Por que é individual e não em grupo?\", a: \"Porque funciona melhor: 12 sessões 1:1, além de suporte entre encontros. Isso exige uma agenda mais enxuta da minha parte, mas garante que cada decisão seja pensada pro SEU caso, não pra média de uma turma.\" },\n    { q: \"A sessão de diagnóstico é mesmo gratuita?\", a: \"Sim, e é diagnóstico de verdade: você sai com o mapeamento do seu gargalo independente de fechar ou não a mentoria. Meu compromisso público é esse — minha reputação no nicho vale mais que uma venda.\" }\n  ];\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const y = window.scrollY || 0;\n      const docH = document.documentElement.scrollHeight;\n      const visible = y > 700 && y < docH - 900 && window.innerWidth < 700;\n      if (visible !== this.state.stickyVisible) this.setState({ stickyVisible: visible });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll);\n    this._onScroll();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n  }\n\n  toggleFaq(i) {\n    this.setState(s => ({ openFaq: s.openFaq === i ? null : i }));\n  }\n\n  renderVals() {\n    const faqItems = this.faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      onToggle: () => this.toggleFaq(i),\n      iconRotate: this.state.openFaq === i ? 'rotate(45deg)' : 'rotate(0deg)',\n      maxHeight: this.state.openFaq === i ? '400px' : '0px'\n    }));\n\n    return {\n      faqItems,\n      stickyDisplay: this.state.stickyVisible ? 'block' : 'none'\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
